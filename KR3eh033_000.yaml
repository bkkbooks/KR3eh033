front:
  text: 序醫之道微矣四難未審二反遽施毫釐之羞滋蔓彌甚自張仲景垂範援證立方本論闡於傷寒雜治編於金匱晰奇胲於針鼻轉渝死於麥芒千祀以還咸資準的然而傳經中絡受病固殊辛熱苦寒施劑尤劇偶遇嚏鼽詎假鳥頭作帝才逢痎痞即推捉母為君斧伐或致傷元升提因之耗液欲登仁壽厥道無由此吾友潘君蘭坪所以有醫略之作也原夫風寒異中湯別桂麻表裡殊攻治歸經脈而濁從鼻入息只透於膜原寒以陽舒氣或蒸為內熱毫毛所中詎由關膈之經灑淅為淫未人支蘭之藏君乃別傷為感異熱於寒取沖淡以養和雜芳香而逐穢列柴胡於八陳方嗤景嶽之粗釐暑熱於三焦全守河間之法復以濕蒸痁起癮重瀉溏辨嘔吐之實虛審制消於水火不貪汙下微判清溫則以外感溫熱立法而濕瘧瀉痢消渴嶇吐諸證附焉自是以還不脛而走執簡問明堂之訣叩門求禁要之方君復刪掇外臺折衷診籍以為戶樞不轉則痛擾諸官主藏失調則血凌百脈不分部次何殊隔幕之蜆未酌盈虛卒有潰川之變況復鬱蒸成疾癃閉為災州都無氣化之官水府窒司冥之令軒轅失馭濁黃溢於龍門金火相刑虛白傷其虎穴爰分痛血逮夫濁淋辨燥濕於疽遺別風邪於咳喘集方七十七首列證三十三門不須五診之能悉合六微之旨洵可家藏笥篋人免寢氛矣或者謂扁鵲善醫隨俗為變邯鄲貴婦為帶下醫濰陽重老為耳目痹醫感陽愛小為小兒醫君於諸條未邊舉例不知邪淫客感病多中於少年春蠶秋掣易招於疹氣治惟先乎腠埋患靡入於膏肓若夫杖鄉稱考庋閣娛珍頤養當慎於重茵權輿詎資乎百草嬰童周眸亦傳百問之篇婦女專科別立奇經之部無求泛濫庶便巾箱至於讞和六鑿消息三停仲氏硯毫長兄治色占大妄之有喜以不藥為中醫此視人之調劑尤屬君之宏願也悉以殺青甫竟問道於盲爰以卮言辨諸卷著學慚好問敢汙李杲之書世有史遷待續倉公之傳同治四年四月同里李光廷序

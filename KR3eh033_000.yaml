body:
  text: 自敘兒侄輩從師羊城余慮其功課之餘風寒不慎飲食不節因主外感春溫暑濕瀉痢瘧七症方與之庶免臨渴而掘井後據云服之多效即館友亦有遵此法而除病者余聞其驗遂翻閲自著舊方皆從平穩立法即無夥邪之患亦無傷元之憂始則欲便於侄繼則思並益同人因復增入頭心腰腹脅腳耳牙疝氣痿躄諸痛小便大便衄吐諸血又消渴嘔吐噎膈反胃霍亂黃疸淋濁癃閉遺精咳嗽諸症大抵少年輩起居飲食不謹所致者共成三十三症此外證治雖尚多遺略但此中數症實人生所易患且又每見時醫誤冶而世人受其害者不少是以不必求其全而思撮其要擬付梓人公諸好俾不知醫者亦得自為調理不致為庸醫所誤凡初起輕恙按法服之諒易就痊至若久恙重恙又不敢謂能盡奏效也番禺潘名熊蘭坪氏自序於西村之評琴書屋附詩並各題贈兒侄輩遵余所著醫略試之頗效因有學醫之志作詩曉之小道仍難哉兒侄曾言業儒之難誰能信無過書亦充棟梁詎易萬卷破無恆不可作良庸分勤怠醫良能濟人醫庸必賈禍證不疑似分藥昧彼此妥娛用同操刀敢信無因果知之惟最佳業之未必可學也祿在中醫豈富而哿作歌曉爾曹儒術斯慰我陳古樵明府璞云作者精於醫而戒其子不為醫此真實本領絶大見識慈悲心事其語不徒訓子可與世土一切學醫者讀之荷花生日日適醫略著成偶得數韻遺興荷香襲書書芬清仰屋而著初告成文字有緣遂余欲豕魚無訛命兒録老來文物倍關情顛連疾苦為之矜壽叢百年終有盡吾沒何術俾生靈偶然有得著醫略酌古准今述不作將期拯厄亦扶元分遞水村與山郭家家養得無病身共作太平民對花沉吟諷不倦彼蒼何時慰吾願蔣湘漁上舍灝云仁者之心仁者之言願典衆生佛前焚香贊誦黃銘石廣文德華云本平素之淨修垂普渡之寶筏如誦長阿含經使彼諸天增益五福直合佛手仙心並傳不朽張韞玉明經仕輝云先生丁詩詩言其志先生明醫醫會其意錦囊青天囊不忍自祕總勒成書先生另續刻評琴書屋吟草二卷故云舉以問世得公之詩將見愈愚傳公之醫猶能醒眯崔壽如茂才廷森云蘭坪先生禪理深邃時於吟永見性真所著醫略一書不異金繩寶筏以之拯救衆生是能具大法力者弟堯臣明府亮功云蘭坪大兄醫略一書證辨而方良慈航普渡其禪而醫乎復讀諸作一片慈悲心事情見乎詞大菩薩心腸善知識法施如是如是

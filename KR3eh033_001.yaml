body:
  text: 評琴書屋醫略卷一外感症即傷風症稍貪風涼最易感受見症頭痛鼻塞或發熱咳嗽因時用藥治法較妥今即春夏秋冬訂方列左春日外感經云春傷於風又云春傷於溫謂春日受風其氣已溫須防夾入春溫一症溫邪忌汗故也春主升夏主泄即外感亦忌大發汗春溫症見下倘口乾舌燥壯熱煩冤便是春溫的症當從下篇春溫法治北杏仁一錢半紫蘇梗一錢半嫩竹葉四錢鮮取剪碎煎建神麯一錢半細甘草八分梔子殼一錢半加蔥白四錢淡豆豉三錢同煎頭痛加連翹鉤藤有痰而渴加鮮竹茹瓜蔞皮仁任用不渴加半夏芥子咳加桔梗杞葉食滯加萊蔔子麥芽曾食肥膩加山查實熱加芩連梔殼改用梔仁夜熱加丹皮地骨倘氣虛中寒者獨用蔥豉湯加黨參四五錢生薑四五片煎服便合其黃耆神麯亦可酌加若氣血兩虛而見微寒微熱者用參歸桂枝湯加陳皮煎方即桂枝湯加入參當歸夏日外感夏傷於濕當佐以去濕夏易感暑當佐以清暑北杏仁二三錢川滑石三四錢青蒿梗二三錢建神麯一二錢甘草梢七八分冬瓜皮四五錢加鮮蓮葉三四錢蔥一二條為引濕盛再加蒼朮或茵陳芩皮小便黃短加梔子木通另有見症當加藥與氣虛中寒者當看前春日外感所列秋日外感秋傷於燥辛溫藥宜少用北杏仁二三錢神麯一二錢杷葉二三錢梨皮三四錢甘草七八分加鮮蓮葉三錢鮮紫蘇葉一錢為引發熱而咳加土桑白皮三四錢地骨皮三四錢燥渴加麥冬知母或鮮活水蘆根生粉葛肉二物代茶亦佳兼受秋暑氣加滑石冬瓜皮或乘露或鮮嫩竹葉另有見症當加藥與氣虛中寒者仍看前春日外感所列冬日外感冬傷於寒且秋主收冬主藏用藥辛散些不妨但冬溫症非所宜耳冬溫症見下春溫症注南方風傷衛者多寒傷營者少如確傷寒自有仲景師傷寒證治可考不復贅北杏仁二三錢神麯二三錢蘇葉二三錢防風一二錢甘草七八分加生薑二三片蔥一二條為引另有見症當加藥與氣虛中寒者仍看前春日外感所列春溫症冬溫同論症治冬傷於寒春必病溫差寒邪久伏已經化熱且入春感於少陽大旨以清涼為主故古人用黃芩湯清心涼膈散誠以苦寒堅陰為正治此症初起壯熱煩冤口乾舌燥必然並見最忌辛溫散藥劫傷津液與尋常外感治法不同若外邪先受引動在裡伏熱必先用微辛涼以解新邪如蔥豉湯最為捷經表分肅清然後進苦寒以清裡熱此法時醫不講動用柴葛薑防發汗傷津以至譫語神昏元神寄養於津液之中若津液傷則神失所養而昏幻症百出終歸莫救誠堪浩嘆冬應寒而反熱亦有是症其名來溫見症同治法同均忌汗白芍二錢連翹一錢半梔子一錢半北杏仁一錢半黃芩一錢半甘草八分加鮮竹葉三錢剪碎同煎渴加麥冬蓮子心鮮梨皮鮮蘆根花粉等胃熱加知母右膏粳米若舌張絳惡飲為熱伏心營喉燥舌乾喜飲水者熱在氣分喉燥舌乾惡飲水者熱在血分加犀角生地銀花麥冬天冬去芩芍杏梔用竹心代竹葉夜熱加地骨丹皮青蒿生地去梔芩又兼風者名風溫其症兼見汗出咳嗽加入薄荷梗牛蒡子之屬兼濕者名濕溫加入鮮蘆根川滑石之流倘此外更有兼症宜參考葉氏書治之暑症未夏至為病溫已夏至為病暑發熱而心煩為暑熱的症前人有傷暑中暑之分因有陰暑陽暑之辨傷陰暑者其脈虛症見發熟惡寒手足微厥腠理開則酒灑然寒閉則蒸蒸熱悶治有三物十物香薷飲清暑益氣湯等法中陽暑者其脈洪大或洪而弱症見大發熱煩渴自汗面垢體倦氣息喘促日晡病減治有六一散白虎湯加入參加竹葉麥冬等法陽暑大忌香薷溫散葉氏亦有小用而佐以黃連者至若種種傳變前賢各有精義可參茲不重悉秋後更有暑熱伏氣之病臨症指南邵新甫引述頗詳當參考之茲擬方僅為陽暑症輕者立法商治若陰暑症當用前所列陰暑三方加減主治擬方不合用若汗頻泄者為暑傷元氣當用清暑益氣湯加減治之倘已成暑瘧下瘧症論之已悉可參考川滑石四錢綿茵陳一錢半青蒿梗三錢甘草梢八分細木通一錢半北杏仁一錢半加鮮蓮葉三錢鮮絲瓜葉三錢並剪碎同煎氣分有實熱酌加石膏知母或梔於芩連心熱煩渴加麥冬蓮子心或鮮竹心鮮蘆根去木通茵陳若煩渴甚用西瓜汁淡水梨汁代茶亦佳如舌絳赤暑已入心營加犀角麥冬生地銀花連翹元參少佐菖蒲三四分去杏仁青蒿木通茵陳其鮮嫩竹葉西瓜翠衣冬瓜皮緣豆皮暑熱皆堪酌用如無汗即陽暑亦不妨少佐香薷六七分葉氏謂香薷佐絲瓜葉能社暑中之風暑風外襲肺胃氣阻即陽暑亦有無汗者凡暑日發熱兼咳嗽者名暑風不須風藥過散即本方少住香薷或參入桑白杷葉桔梗蒲荷梗便合附案暑邪變瘧暑之陰陽治各不同其分別固為最要復思長夏濕熱交蒸暑必夾濕夏熱人喜當風易感暑風更當分別何者輕重余在羊城診琴友楊君星門暑邪變瘧一症初患暑時醫謂外感重而暑濕輕用柴葛薑防從風治暑風作冬日風寒治謬甚更醫謂濕重用蒼朮茵陳又更醫謂熱重用芩連知柏終歸罔效以致暑熱不解而成瘧邀余診以三説詢余余日是不難辨即君亦能自辨之古人謂傷風惡風傷寒惡寒傷食惡食推之凡察其所惡即知其所傷今君喜披襟當風是不惡風非傷於風可知渴喜涼飲飲多無痞滿之患濕病多飲必覺胸脘痞滿且進西瓜梨汁更覺胸脘暢適是不惡濕非傷於濕可知瘧來身熱熾且心熱而煩暑先人心心煩是暑出症貪涼而惡熱是傷於暑熱可斷況脈亦洪大耶但暑熱無質無形本伏三焦氣分後醫未讀劉河間先生書不知治暑法程徒用苦寒作六經實熱主治故仍不效耳茲擬方遵河間胎暑熱當先清肅上焦氣分法選辛涼輕清之品投劑諒無不效果服二劑病減四劑病痊方用石膏知母麥冬鮮嫩竹葉滑石各三錢蓮子心甘草各八分香薷五分同煎服其出入加減亦不過地骨蓮葉洋參粳米濕症濕有中濕寒濕風濕酒濕濕熱濕溫濕痹濕痰之名理宜分內因外因之治茲訂中和滲濕之劑當察其所因而加減治之凡濕症舌多白脈濡緩濕鬱則脈象兼呆鈍仲景師云濕家忌發汗汗之變痙厥患濕者不可不知茯苓皮四錢綿茵陳一錢半北杏仁一錢半大腹皮二錢白緒苓二錢閩澤瀉一錢半加梔子一錢淡豆豉二錢引或用通草五六錢先煎湯去渣將湯代水廁藥脾虛受濕加白朮蒼朮去梔子杏舌白惡飲或周身盡痛此濕阻氣機以至氣不能連行故周身盡痛宜加波蔻仁馬兜鈴或霍香梗滑石濕熱加黃柏黃芩寒濕加附子乾薑去梔子腹皮杏風濕加防風霍香葉濕痹加防風狗背濕溫重用鮮蘆根通草煎湯代水去豬澤加滑石甘草酒濕加枳棋子葛花濕痰加製半夏陳皮又濕在上宜防風濕在中宜蒼朮濕在下宜利小便即本方或再加滑石車前便合濕在周身宜烏藥薑活狗脊等濕在兩臂宜靈仙桑枝桑寄等濕在兩股宜牛膝防已萆薢等審其患濕之處而方中加以主治之藥為引導則發藥治病無不效矣泄瀉症書云濕成五瀉飧溏驚濡滑又云氣滯為脹濕鬱為瀉可知瀉不外乎濕然有腹痛必兼食積無腹痛但濕鬱陽明蒼朮一錢半雲苓三錢陳皮一錢木瓜一錢防風一錢豬苓二錢腹皮一錢半澤瀉一錢半方內蒼朮不覺燥加多覺燥減少至若腹痛則加木香或濕檳榔霍香梗食積加厚朴神麯或萊蔔子山查或去腹皮木瓜酒積加乾葛熱加芩連寒加桂枝吳萸附子去豬苓腹皮防風凡大辛熱大苦寒藥未涉醫者宜逐味漸加為穩書首凡例已經列明脾虛加入參內朮附子去腹皮豬苓澤瀉若五鼓後瀉且有定時者為脾腎皆虛宜四神丸加人參茯苓白朮附子粟殼之類又凡痛而瀉瀉而痛減者食積若痛而瀉瀉而痛不減者乃土衰木乘脾虛故瀉肝實故痛宜用土炒白朮三錢炒白芍二錢陳皮一錢防風一錢此名痛瀉要方或更加木瓜一錢炒蓮葉二錢同煎人參茯苓炙甘草煨乾葛皆可酌加久瀉者須少佐升麻數分二症上擬方皆不合用痢症見症裡急後重腹痛欲便不便濕熱食積相併則成此症痢色有赤有白之不同亦因其受病有熱重濕重之各異熱勝於濕則傷胃之血分而為赤痢濕勝於熱則傷胃之氣分而為白痢若赤白各半則氣血兩傷治法當宗劉河間先生調氣和血之旨和血則膿血自愈調氣剛後重自除茲因將赤痢白痢赤白痢分症處方治之赤痢方金銀花三錢建神麯一錢半山杳核二錢當歸身一錢紅曲米一錢生甘草八分云黃連一錢或加陳茶結糖各三錢同煎痢色赤甚或酌加紅花六七分地榆七八分引熱甚黃連銀花各再加一二錢濕加滑石防風食滯加萊蔔子苗厚朴腹痛頻加木香數分便澀滯而大痛加酒炒大黃數分或錢零若久痢微痛澀滯而燥渴者為下多傷陰加生地阿膠黑芝麻白芍去二曲山查連或獨用六味地黃湯主治凡痛緩積稀為熟滯漸去當和血生熟地黃生制首烏當歸白芍黑豆黑芝麻為要藥去二曲連山查白痢方川滑石三錢炒銀花二錢建神麯一錢半泡蒼朮一錢綿茵陳二錢生甘草五分防風肉一錢加炒香蓮葉二錢為引鮮干任用濕微或渴減蒼朮濕盛不渴加蒼朮或再加白朮茯苓另有見症當加藥當看前赤痢症所列赤白痢方銀花三錢建曲一錢半青皮五分防風八分滑石三分黃連七分土炒陳皮五分甘草八分加當歸五分蒼朮五分為引如赤多於白當歸借蒼朮或再加多些銀花黃連白多於赤蒼朮倍當歸加多些防風服二三劑後若得痛緩積稀加白朮茯苓當歸白芍以調和氣血去滑石青皮或再去黃連蒼朮減少銀花或再加木瓜甘草改用炙另有見症當加藥仍看前赤痢所列凡久痢仍脈數有熱香連丸最佳倘赤白將盡症轉脈虛自汗真人養臟湯訶子散在所必用經驗赤白痢方銀花滑石白糖各等分多煎代茶漫飲又赤痢銀花倍滑石白痢滑石倍銀花痢已久便仍滯加打破黑芝麻同煎口乾渴加生粉葛肉同煎附論時行傳染二症痢症慣有時行與傳染二種尤常分別治之時行者從皮毛而入症必兼見微惡寒邪風所過行於一家則一家病行於一鄉則一鄉病當宗喻嘉言初用辛涼解表次用苦寒清裡法宜敗毒散加減傳染者從口鼻人症不見惡寒穢氣所觸染一人則一人病染一方則一方病當宗劉河間調氣行血法宜芍藥湯或參入霍香正氣散加減治之瘧癩瘧一日一發者其邪淺兩日一發者其邪深三日一發者名三陰瘧流連難愈其邪原伏少陽入與陰爭則寒出與陽爭則熱爭則病作息則病止其邪仍伏本經寒熱之來必應期而至若寒熱模糊來勢混而難分此邪氣重而正氣怯若寒熱相等作止有時斯邪氣輕而正氣不甚虛茲擬方先從正氣未虛者商治建神麯二三錢黃芩一二錢青皮八分法夏曲二三錢青蒿二三錢甘草八分春冬加薑棗夏秋加蓮葉久瘧與冬月皆去青蒿加柴胡寒多加草果或桂枝熱多加知母或石膏凡發熱無汗最忌石膏慎之又有汗忌丹皮無汗忌白芍均不可不知渴加花粉麥冬去二曲痰多加瓜蔞夏曲改用半夏夜熱加丹皮地骨去二曲夏日濕盛加滑石茵陳不渴寒多加蒼朮兼暑熱加滑石黃連秋燥去二曲青皮芩加桑白皮地骨皮麥冬杷葉或鮮蘆根冬瓜皮梨皮若正氣虛者擬方不合用宜用補中益氣湯加減治之又單寒無熱宜用附子理中湯加柴相單熱無寒宜用白虎湯少加桂枝此症發於夏秋者暑濕為患者居多暑必夾濕當分暑與濕何者為重暑熱重者瘧來者必熱重而寒微唇舌必絳赤煩渴而喜涼飲飲多無痞滿之患當宗桂枝白虎湯法及六一散加入辛涼之品治之涼如麥冬竹葉蓮葉類辛如青蒿香薷類濕邪重者瘧來時雖則熱勢蒸燔舌必有黏膩之苔渴喜暖湯胸脘覺痞脹嘔惡當宗霍香正氣散及二陳湯去甘草加北杏仁白蔻仁生薑之類治之凡首列擬方原為輕症投劑更有偏於寒者主以大劑薑桂附偏於熱者主以大劑石膏芩連王太僕云熱之不熱是無火也益火之源以消陰翳寒之不寒是無水也壯水之主以制陽光趙養葵遵之以八味丸益火之源六味丸壯水之主治久瘧多因此法收功六味是益陰利陽法脈與症確陽勝於陰而後用此陰藥方無貽纍慎之倘間日一發者非瘧期日不宜用表藥祛邪亦不宜蔽固其邪有濕者去濕有熱者清熱有滯者行滯總以蔬蕩其邪為主若氣血虛者當佐以扶元至期日然後用表藥以社邪外出服藥宜早三個時許三陰瘧之治法亦然期前後兩日亦但當扶正至期日然後少佐表藥以社邪即春夏令主升泄柴胡亦當少佐凡久病必入絡須用當歸桃仁少佐紅花上三味活絡血下三昧蔬經氣草果桂枝柴胡自能透邪外出茲擬因暑熱成間日瘧者立一法治其餘各因可推間日瘧期前一日後一日服方劑宜輕小建神麯一錢半夏曲一錢半陳皮三分甘草三分生扁豆三錢不打加鮮蓮葉三錢切碎同煎熱加鮮竹茹渴加麥冬蘆根濕加茵陳食滯加穀麥芽虛加參朮寒加生薑煨薑有痰倍夏曲瘧期日即用上初擬治瘧六味原方並參所列加減法治之體虛者月補中益氣湯加減三陰瘧余每用補中益氣湯與何人飲法加減治之瘧期前後兩日治法專主扶正三陰瘧期前兩日後兩日服方亦宜輕劑黨參三錢首烏一錢制神麯七分炒陳皮四分當歸一錢加生薑一二片有痰加半夏睥虛加白朮大棗或更佐人參三陰瘧期日服方早三個時服或五更服亦佳人參隨用白朮一錢半桃仁八分柴胡八分黃耆二錢首烏三錢紅花二分黃芩八分當歸二錢桂枝八分草果八分青皮五分加生薑二片大棗三枚煎方中如用黨參宜四五錢麗參二三錢人參酌用之凡方中用人參加野山土木關東吉林高麗防黨潞黨須因人因症用之其分量輕重亦燃即凡方藥中之輕重皆然如原方服不知則分錢倍用此三陰瘧方宜於溫補藥中分錢倍用倘輕症與幼科其分錢或減半用之熱多者加柴胡黃芩參耆術歸桂草果略減少寒多者加桂枝草果單寒無熱者柴芩不用少壯者此法多效老弱者常遵下列高鼓峰法高鼓峰先生云三陰大瘧最難治余於歲月未久者用參湯下二妙丸橘紅半夏二味神麯和丸服至半月一月自愈如年深月久尫羸不堪者大劑養營湯吞八味丸仍於湯中加附子一錢十貼必除久瘧用補中益氣不效必須遵此法附案暑邪變瘧黃君于飛余舊知也余嘗學琴於其尊人太原廣文于飛時少亦同學焉今復同道而學醫也其尊堂夏日偶患暑瘧症適於飛外出延醫某治之誤用小柴胡再加苦寒升散藥服二劑病增劇寒多嘔惡不食汗大泄于飛旋里頻進溫補繼復邀余同診六脈弱而無神面唇舌俱白且有一種寒冷象閲近服方多用六君加歸耆草果薑棗等余曰藥從溫補病宜漸輕於飛日僅得納食而瘧至之苦依然也瘧將作必先頻嘔瘧止而嘔仍不即止家慈最苦者嘔君先際之餘日此嘔原過服薑活柴胡升動肝風所致肝風既欲動更乘瘧勢一作益挾之以肆其升逆之威夫木動必乘胃土邪阻胃降嘔斯作矣用術草棗而培胃虛以制肝用黃者而維陽氣以固衛原治久瘧汗多善法但現苦頻嘔有升無降此等究屬升提守中愚見姑擬暫停專取降逆理虛一法方用生左牡蠣塊一兩吉林參三錢同煎當歸五錢桂枝陳皮製半夏生薑佇各一錢于飛見信果一服瘧即不復作瘧止後仍用於飛參耆術歸草棗舊方法加入附子溫少火以生氣而調養復元又案瘧後辨寒熱吾友黃云裳之女十二歲秋杪患瘧醫以柴葛薑防治而愈之已進飲食後復發熱渴飲微汗津津醫誤認復感仍用表散熱愈熾渴愈甚邀余診脈得右關獨擻余曰此食滯耳非外感也原治瘧時辛散過用燥傷胃津胃液不充因食納而化遲漸生積熱以至壅壓營衙而不能相和胃為陽土故獨發熱兒輩病初愈即頻進飲食每多此症倘仍苦寒以傷胃辛散以劫津斯變幻立殆矣治法宜選甘涼以養胃生津胃津充剛穀食自化營衛自和而肌熱自解仿人參白虎法加減麗參五分同煎麥冬連心鮮嫩竹葉剪碎各二錢生扁豆不打三錢知母石膏各一錢甘草三分石膏研末白糖沙拌炒後下煎服一劑渴熱稍退三劑全愈云裳曰吾今始知傷食亦有寒熱也余曰更不止此云裳曰君能為我備述乎余曰試為君略舉之風塞傷於表營衛不能運行於外而寒熱生暑濕穢濁與燥氣口鼻吸入阻其氣機營衛不能轉旋而寒熱亦生食滯阻氣之升降實火擾氣之流行營衛因失其循行之度而寒熱亦生又況陰虛生內熱陰盛生內寒陽盛生外熱陽虛生外寒重陰則熱陰盛隔陽重陽則寒陽盛隔陰而陽維為病更苦寒熱有不關於營衛之利興不和而急當講究夫育陰以和陽者耶云裳曰然則陰虛寒熱與外感寒熱究何以辨別而治之餘曰以宥汗無汗為別有汗屬營衛不和因營衛不充循行失度故或發熱或寒熱葉氏論治調若用桂枝湯當重用白芍以斂陰和營無汗屬肝腎奇經以至陰深遠難隔越諸經以達於陽分而泄其汗也葉氏論治調當用芳香輕清之品以宣通八脈滋陰益血之藥以調養奇經倘參入當歸桂枝湯法治即桂枝湯加常歸亦須去白芍芍酸不走絡也云裳曰君詩云症不疑似分藥味彼此妥誠然

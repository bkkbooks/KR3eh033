body:
  text: 評琴書屋醫略卷三淋症濁癃閉同考淋有五淋之分濁有精濁便濁之別總屬腎病臂有二竅一出溺一出精淋出溺竅而屬肝膽濁出精竅而屬心腎不得混治治淋症方可統治五淋宜辨症加引赤茯苓四錢當歸梢一錢山梔仁一錢川萆解四錢甘草梢一錢石菖蒲三分石淋下如沙石用銀硝硃砂滑石等分研勻朴硝一味宜隔紙炒炒至紙變黃色為度每服三錢或加發灰石首魚頭內石灰即將此湯送下甚則日服二三次另用海金沙木通煎湯送膏淋下如膏脂加烏藥益智仁沖鹽些少氣淋氣滯不通臍下悶痛加荊芥制香附麥芽勞淋從勞力而得加入參黃耆白朮少佐升麻柴胡歸改用全歸草改用炙草血淋瘀血停蓄莖中作痛加牛膝鬱金桃仁或沖韭白汁小杯同服至若點滴俱無症名癃閉加北杏三四錢麻黃一錢同煎夏月麻黃用四五分若癃閉而不渴此法不宜須另用通關丸主抬即滋腎丸附案二石淋黃閣鄉張某年七十餘患石淋小便點滴而出痛甚少腹脹氣微喘能食醫用清利法罔效求余治左尺弦大直上左關余用大補陰丸臺滋腎丸治龜版一兩地黃五錢知母黃柏各三錢肉桂六分張畏桂性熱減其半服後小便稍通腹脹略減而痛不除再求治余調必須佐桂六分乃效信服之小便大利出石數粒如橘核大遂愈明經鄉周韶石叔令昆年將三十石淋阻塞溺竅點滴不通以至腹脹如鼓痛楚不堪臥床不起危急之際延余治脈呆鈍不甚應指氣不升降轉旋失職故也余用京柿炭一個連霜蒂煆硃砂三錢二味方得自楊溶馬虞階孝廉謂凡小便不通皆合用粥水送下余用治血淋屢今又仿之以治石淋芒硝三錢同研末用杜牛膝五錢時藥店無以鮮土牛膝一兩代懷牛膝川滑石黃柏桃仁韭白各三錢甘草梢石菖蒲各七分煎湯送下服後出石一條長約一寸大如粗箸小便遂頻比沐地俱濕腹脹頓消而愈治濁症方建蓮米四錢連心麥冬一錢違心石葛蒲五分鹽水炒雲茯苓三錢益智八分遠志肉八分青黛拌水煮乾川萆藤三錢烏藥八分甘草梢八分鹽水炒濕盛加蒼朮白朮黃柏去麥冬遠志蓮米便濁加豬苓澤瀉或海金沙滑石亦去麥冬遠志蓮米精濁加兔絲子桑螵蛸生龍骨或關沙苑山藥五味去草梢萆薢烏藥益智赤濁加生地當歸天冬去萆薢烏藥益智白濁加入參黃者白朮或蒼朮豬苓去萆薢麥冬烏藥或再去遠志蓮米凡莖中痛必須加鹽水炒黃柏為引遺精此症當辨有夢無夢與濕熱之因有夢治心無夢治腎濕熱治小腸膀胱陰虛者填補陽虛者補氣陽強者瀉火故前質治法有寧心益腎填精固元與清利濕熱之別茲先擬一寧心益腎固攝之劑以便因各見症加減治之桑螵蛸三錢云茯神三錢大麥冬二錢連心建蓮米五錢違心熟棗仁一錢半遠志肉五分制加龜版打碎五錢生龍骨打碎三錢二味先煎或加菖蒲云連各三四分為佐使如有夢加多些黃連無夢但加五味人參陰虛加熟地天冬阿膠常歸等去棗仁遠志茯神陽虛加人參黃者杞子杜仲白朮等去龜版麥冬龍骨桑螵蛸陽強加生地知母黃柏去棗仁遠志茯神遺泄頻頻宜佐以固攝之品如兔絲子五味子覆盆子金櫻子蓮鬚之類選入一二味為佐使至若精遺因濕熱者宜另用豬苓湯法治之其芡實山藥沙苑蓮米凡遣泄症皆可常食便血此症有風淫腸胃有濕熱傷脾始則臟腑受傷久則陰絡亦損治原不一肯堂醫鏡芊録尊生引述頗詳當參考之茲即大腸受熱者訂一方俟因症加減大生地六錢黃柏炭七分槐花一錢半赤少豆四錢地榆炭七分銀花一錢半加木賊一錢烏梅二個同煎梅或煆炭用熱甚再加黃芩蓮葉或桑葉丹皮如服二三貼血仍見必須用黑芝麻洗淨打破生首烏各四錢加入同煎去木賊梅因濕加防風內術去生地因風加荊芥當歸防風去銀槐花若血下色淡者另用四物湯加龜版生首烏制首烏煎服便合倘便血流連止而復發用生首烏末米糊丸每服三四錢甚效而京柿黑豆煎湯送下更佳金匱分別糞前下血為近血用赤小豆散糞後下血為遠血用黃土湯果於脈症有相合則於古法自堪師余當治戴姻兄便血或糞前或糞後無定用生首烏制首烏大生地各四錢白朮防風木瓜白芍各一錢常歸陳皮各七分一帖血減三帖全愈凡便血柿京黑豆録豆赤少豆黑芝麻蓮米可常服或糖作羹或選入同豬精肉柴魚或豬大腸煎湯俱佳小便血即尿血溺竅病也其源由於腎虛非若血淋由於濕熱其分辨處以痛不痛為斷痛屬血淋不痛屬尿血餘訂是方施治頗效因録存之且此方不但治尿血方中烏梅炭當時兔絲子皆倍用生地改用熟地其當歸蓮米二味同用黑米醋煮透炒乾婦女崩漏久不愈亦會迭效龜腹版一兩先煎兔絲子四錢大生地五錢鹿角霜三錢先煎白當歸一錢半建蓮米五錢連心用打破煎加烏梅炭二個米醋泡洗為引如陰虛火炎加知母黃柏各一二錢此配入大補陰丸法用豬腰子湯京柿黑豆湯旱蓮草湯方書有獨重用旱蓮治此症者代水煎藥俱佳此等間藥少用則無功多用則礙方藥煎故酌用煎湯代水一法前蘆根草湯即此意王肯堂醫鏡主心經受熱遺熱小腸用五淋湯加石蓮麥冬而君以黃連治之餘思此方可治血淋似難治尿血姑録以俟考因直指云小腸有氣則小便脹小腸有血則小便澀小腸有熱則小便痛可知無痛則無熱尿血無痛故疑王論沈芊緣亦主腎虛以太極丸主治衄血肺火上蒸則血從鼻出名曰鼻衄大陽與胃熱上逼則血從齒出名曰齒衄均宜清降方可統治但齒衄血症最輕者可服藥可不服藥乾白茅根四錢鮮者倍用大生地三錢元參三錢正土桑白四錢鮮者倍用大麥冬三錢連心牛膝一錢半加鮮竹前青遠茶各二錢同煎方平淡宜多煎代茶服二三劑血不止加童便一小杯沖服令引熱下行必應熱盛叉斛天冬丹反黑梔白茅花可任加倘鼻衄不甚者亦等齒衄均無足慮若其甚者與吐血無異蓋漏血過多而不止則非關血熱實由氮虛不能統攝急當補氣以攝血補氣以生血宜用録時補血湯法黃耆一兩當歸三錢加薑棗煎不涉醫者逐杯試之此法雖氣息奄奄亦可回生至於傷寒鼻衄名曰經汗瘟疫鼻衄名曰外潰皆喜其得衄而自解不必再商治凡一切血症突來太多者必須於補氣法治之吐血有內因外因究竟因於內而七情飢飽勞力所傷者尤多攻補溫寒須憑脈證茲先就陰弱陽亢者擬一方後參末議大生地八錢干茅根四錢舊黑梔一錢大天冬三錢茜草根一錢細甘草五分加生柏葉二三錢鮮藕節三個同煎服一二劑倘仍頻吐不止再加生蓮葉三四錢生艾葉二三錢炮薑五六分童便一二杯沖服或用田三七末六七分調入如脈數熱甚加犀角黃柏丹皮倘症輕者旱蓮女貞黑豆皮浮小麥麥仁麥來桑寄知母可任加如無外感鱉甲龜版元參牛膝秋石皆可酌用若咳胞脅引痛者加冬瓜仁生薏米蘇子降香以降絡桃仁紅花以活絡吐血先見胸痛血黑成塊者此為瘀血加桃仁丹皮香附醋炒大黃治之皆去甘草然此特初患治法高鼓峰云血症久古人多以胃藥收功如烏藥沉香炮薑大棗此虛家神劑也倪漱山亦云七情內傷脾胃先病故多見噁心固元湯歸脾湯補中益氣湯等法必不可少而吾見患此症者醫不輕用補病家尤畏夫補以至愈後或數月而復發或一年而復發卒至纏綿而莫救者多矣亦由其元氣已虧營血未能安常而循行經絡也余於見信者雖屬熱症以清涼奏功繼主育陰和陽亦必佐以固本培元之法如生脈六味生脈四君與左歸飲加參歸等更用歸脾丸原方或遵鼓峰法加減蜜小丸常服守此法調養以至於康健勝常血永不發者指不勝屈肯堂於火症血稍止即用龜版首烏地榆加入四物湯治之鼓峰用六君加當歸治之或加黃者謂參者以回其氣氣回血自術行經絡或用重料六味左歸等飲於水中養本亦必加人參謂使氣自陰生也又芊緑引仁齋直指云凡氣虛挾寒陰陽不能相守血亦妄行宜理中湯加木香當歸薑炮黑血得暖自循行經絡陳修園亦謂凡吐血服寒涼及滋潤藥益甚而望其形色有寒冷象者是陽虛陰走亦主理中湯加木香烏藥或木香當歸要之所因不一亦難盡述欲通變達權溫清各常常於本門所載博覽之附案肝病誤治胃鳳浦馮君蕙庭人瘦而長咳嗽繼以吐血醫與溫胃劫痰藥血益甚延豫治脈得左堅右弱豫曰貴恙乃肝腎陰虛而生內熱薰蒸脈絡致血不得留靜前賢謂瘦人之病慮虛其陰今服燥藥即犯虛虛之戒陰愈虧陽愈熾矣故血益甚愚見主先治肝方用復脈湯去桂薑參用麗參加白芍二錢生牡蠣塊五錢次日診仍用前方加田三七末四分沖服另用淡菜黑豆冬蟲草煎豬精肉湯作飯菜再診脈緩血止惟咳痰難出轉用醒胃汁以滌痰飲一法麥門冬湯加叉斛二錢與麗參同先煎五六貼諸恙俱安繼用歸脾去本香加陳皮白芍五味麥冬杞子為小丸常服痰咳漸除身體日健又案胃病誤治肝鳳浦胡君易堂夏患痰咳失血醫用膠地等作肝腎陰虛生內熱治不效且痰增胃減延余診脈得右堅左弱余曰前人主左堅填肝腎右堅理肺胃今右堅治胃為要炎夏陽氣方升泄冒陰虛而無鎮壓之權勢必震動胃絡絡傷則絡中之血因隨陽氣上升倘云三陰熱蒸脈必徵於左部據理論治藥宜先淡薄味以調養胃陰曾服膩藥太多須佐以宣暢脘氣方可消痰安穀生扁豆用粒不打五錢麗參一錢麥冬茯神各三錢石斛穀芽各二錢陳皮甘草各四分服三貼再診血止脈緩惟時或心悸或汗微泄主兼理心營肺衛黃耆沙參各三錢麗參麥冬各二錢五味炙草各三分麥仁棗肉各四錢多服調養仍用歸脾丸加杞子五味蜜小丸常服精神自此日旺體健勝於平時吾因思胡馮二君皆先服清而後受補故血不復發實賴參者以回其氣氣回血得守其常度湎循行經絡也夫患血而畏補者多是以終難了局因存此二案醒之又案苦寒過服元氣受傷羊城宋君勉之知醫素喜清涼涉稍溫補不敢服久患咳血所服藥餌無非清降以致年餘反履不已近服犀角地黃湯納穀漸減因邀余相參診右脈空大無神余曰金匱云男子脈大為勞謂陽氣虛未能收斂也即據君述症咳頻則汗泄顯是氣失統攝絡血上泛之徵倘依然見血投涼見嗽治肺胃口從茲敗壞矣愚見主急固臟真正合仲景師元氣傷當進甘藥例能守此法胃土自安肺金自宵吐血痰咳亦自止方擬黃者四錢人參麥冬白芍各一錢五味炙草各七分杞子南棗肉各二錢勉之見信連服四貼血止胃漸進此後從余言自用婦脾湯加減調養而獲愈續附丁卯新案虛陽升泄強血妄行同里黃和叔君好學士也夏五暑熱炎蒸正天地大氣泄越時天地氣機泄越人身氣機亦應之月之草四綺窗挑燈動誦勞傷心陽亦暗吸腎陰初交亥忽吐血碗許群季皆通醫理草五早自訂四生丸服交亥見血如前且增惡寒甘六自轉用甘草乾薑湯加味進炙草炮薑五味各錢半白朮防黨各三錢方佳但欠鎮攝交亥仍見血加初惟惡寒略減草七延醫某治某稱轉方佳獨嫌五味收斂怪論真氣泄越理合收攝原方減此加當歸更妥是晚亥血來滋甚歸辛動上升無五味以斂之地以滋之龜附以鎮導之故滋甚草八邀豫診六脈弱尺為甚詢足冷否曰將交亥足漸冷冷氣上少腹肝位肝藏血則氣喘氣呼出心肺吸入腎肝肝腎陽升吸氣艱於入故喘而血溢豫曰據脈與述症且血必見於戌亥實肝臂病多戌亥為至陰時肝腎為至陰臟放日則無恙而交亥則病作原真陰有虧孤陽無偶失守上走血亦隨之夫陰陽互為其根無陽則陰無以生無陰亦陽無所附往常引導其陽兼鎮育其陰則孤陽有歸而血自安其位方用熟地龜版各五錢土木參常歸附子炮薑各一錢五分五味子炙甘草各一錢中有疑暑月吐血而用參附且會服歸而益甚者余曰尺弱足冷顯是腎陽不潛藏從滋填其陰而不固守其陽必難奏效古人原有補氣以攝血法人參附子參附湯他能固守腎氣當婦附子歸附湯也能固守營氣血去已多巡得不佐溫補以固守臟真群季曰善遂服之草九診據述昨夜戌亥血雖不來而足冷氣促仍未盡除余仍用草八方去炮薑倍用附於加胡桃肉四錢覆盆子二錢以攝助納服二貼復邀診已諸恙俱安但夜難熟睡擬兼理心營草九方去龜版附子胡桃覆盆加杞子三錢茯神棗仁各二錢麥冬一錢炙草五味改用四分連服數貼後參入杜仲黃耆防黨白朮鹿茸因脈症加減而調養復元選録王肯堂先生論痰中見血一症肯堂云其血或一點之小或一絲之細語其勢若無可畏而病根反深此血非由胃出乃肺臟中來肺本多氣而少血是以出者亦少今因火逼而隨痰以出則肺慮其枯而無以主一身氣化矣其害不滋大乎治法於除痰中加入止血藥如貝母瓜蔞仁茯苓麥冬元參竹茹蘇子薏米之顯以治痰犀角阿膠柏葉黑梔之類以止血黃芩黃連之類以降火調花芷石末四五分徐徐服之又法用竹瀝一碗入阿膠二兩溶開將石膏煆過一兩蛤粉一兩青黛半兩好墨一兩共為塵末調利丸如黍米大每服一錢香茗送下其效甚速咳嗽咳為氣逆嗽因有痰內傷外感所因不同五臟六腑受病各異茲先就尋常患咳嗽者訂一降氣除痰劑以便因各見症加減茯苓三錢塊薏米四錢生用陳皮五分北杏一錢牛夏一錢半制蘇子一錢半甘草五分渴加麥冬瓜蔞皮仁任用半夏易川貝陳皮易橙皮橙皮甘苦多於辛異橘柑皮之辛燥痰多不渴倍半夏陳皮加生薑或瓜蔞薤白咳胸脅痛加芥子少佐薑汁炒黃連或醋炒川棟子熱加石膏知母或黃連黃芩寒加益智生薑或乾薑五味細辛去杏蘇子風加防風一蘇子改用蘇梗濕加防風蒼朮脾虛加入參白朮當歸去蘇杏薏肝腎虛吸氣短氣吸入腎肝加熟地當歸五味或杞子胡桃牛膝去蘇子北杏薏米或再去甘草又因咳而後有痰宜順氣治在肺肺主氣肺惡溫燥麥冬橘紅橙皮更佳川貝知母桑白紫苑為要藥因痰而後致咳宜消痰治在脾脾藏痰脾惡寒潤白朮蒼朮制南星製半夏為耍藥清火兼之宜薑汁炒黃連久嗽不愈用麥冬為君川旦知母茯苓竹茹黃芩蘇子之類為佐少加五味甘草燈心服之困風寒虛而咳忌服凡咳嗽發熱不休者不治咳而汗紲者不治此臟真不藏氣泄而為熱為汗治當固攝臟真如入參固本丸復脈湯去薑桂加生龍骨生牡蠣磁石等治之亦幸有獲愈者左不得眠為肝脹右不得眠為肺脹俱屬難治閲葉氏臨症指南又非僅主肝脹肺脹一説症有疑似病有實虛論治者其慎之葉氏治右不得眠用麥門冬湯謂胃津虛無以養肺肺病降已不及而復右眠遏之故咳更甚左不得眠用復脈湯去薑桂加生牡蠣麥仁治之調肝陽升逆大過安能左眠以過其升逆之成故咳更甚治咳血症多用此法若果肝脹肺脹宜疏宜清宜斂自有各家本門可考不復贅即沈芊緣尊生著述證治頗詳可參附案咳嗽而瘖凡治病問其見症如何問其致病之因如何似較望聞切為倍要余嘗醫郭廉訪夫人年約三十外廉訪久以計偕宿京得第補外因接卷赴任夫人得喜信後忽患瘖症咳多痰少夜裡每覺火升喉舌微痛而日問飲食無礙遍訪名醫迭治罔效延余診余曰貴恙咳先乎抑瘖先乎家人曰瘖先余恙後漸起者余復問曰起此恙日會多飲醇酒乎曰無偶因夜坐看木魚書勞神明早即覺音破耳餘診其脈兩尺動數有力閲舊服方雖多亦不外清肺蔬肺止咳除痰中上兩焦藥余轉用上病治下一法龜版八錢大生地黃柏各四錢知母茯苓各二錢羚羊丹皮澤瀉各一錢余曰據述病因與脈相對沉佝似易起者藥不十貼當見效家人速於赴任聞余言喜甚時吾友謝司馬茹坪偕余往郭其戚也獨訝余言曰痰咳而用龜地諒難見效且重用黃柏短屬不通余笑曰子姑驗之次日初七復到診是夜已不覺火升咳艙舌痛矣仍用前方黃柏減一錢再服和八診兩尺漸緩聲音漸起仍用前方去丹澤方中改用龜版四錢羚羊黃柏各八分加鮮菖蒲五分煎調入真珠末七分服連服三貼十一日復到診音出已亮但欠清耳又轉用清肅上焦氣分方法沙參八錢麗參黃耆天冬麥冬連心各一錢白菊杭菊各四分加南棗四枚雞子白一枚同煎雞子先蒸熟去殼去黃取白煎僅服匹貼聲音漸清而愈茹坪曰藥已效矣吾究未得其解也余曰此付情度理耳夫妻契闊數年一旦相聚有期誰復無情況夜靜獨坐倍易觸撥情思且我粵之木魚書多豔寫男女之私以過去之情感未來之情相火尤易發動脈更得兩尺動數症亦由迅速而起五行中最迅速者莫若風火調非龍相火而何龍火一動勢必上升上升必凌爍肺金金空則鳴金實則無聲矣夫腎脈循喉繞舌厥陽慣從子醜奕騰此喉舌夜痛所由來也余用地以滋之龜以潛之知柏丹澤苓羚以降之泄之而復蔬通之羊角最靈動能蔬泄火邪之入絡者斯龍雷潛伏而安其位肺金清肅而守其常其瘖又安有不速愈者茹坪曰善善審問之慎思之明辨之作醫之道亦當如是乎選録王肯堂辨十嗽與五臟咳以便參考火痰嗽者咳必面赤用力久而後出者是也不宜用半夏南星以其太燥也惟以貝母知母瓜蔞仁竹茹之類以化痰黃芩黃連山梔之類以降火蘇子橘紅茯苓之類以順氣濕痰嗽者喉中漉漉有聲嗽而易出者是也不宜用元參阿膠知母以其滋潤也惟以蒼朮防風之類以燥濕半夏星薑汁竹瀝之類以去痰枳殼橘紅之類以順氣黃芩山梔之類以降火郁痰嗽者胸臆脹滿連嗽不出喉中有喘聲夜不得眠上飽下飢老是也不宜用五味麥冬以其補肺也惟以枳殼桔梗便浸香附之類以開鬱川貝瓜蔞半夏之類以治痰蘇子杏仁之類以定喘茯苓黃芩山梔之類以降火頑痰嗽者膠住咽喉揮咯不能出必努力大嗽而後出少許如脂膏之狀者是也不宜用煎劑宜以散子消磨之如青黛蛤粉浮海石風化硝瓜蔞仁礞石明礬之類為極細末以竹瀝薑汁調服以其膠固不開非輕劑所能愈也清痰嗽者必待嗽而後出其痰不稠黏者是也宜用緩藥治之如貝母花粉茯苓黃芩竹茹橘紅蘇子竹黃之類風痰嗽者肺氣壅盛必頓嗽而後出其痰浮而有沫狀如津唾而略稠者是也宜用輕浮之劑以治之如薄荷紫蘇梗葉桑白防風半夏黃芩枳殼之類少加麻黃甘草用麻黃宜配北杏以降氣寒痰嗽者得於秋冬之交或傷於入水宿露或傷於冷雨冷風所致其嗽必哮喘或肩背覺寒得熱湯飲之即緩者是也宜用蘆吸散如肉桂雄黃鵝管石款冬花甘草等分為極細末用蘆管挑藥輕輕含之吸入喉內徐徐以清茶過口或以此藥蜜丸如雞豆大含化亦妙若熱嗽去肉桂用井泉石若用煎劑宜半夏南星陳皮茯苓款冬花生薑甘草之類酒痰嗽者因醉後感冒風熱腹中有酒積飲濁酒即發者是也宜用山梔黃芩黃連以治火貝母瓜蔞半夏曲之類以治痰蛤粉花粉緑豆粉之類以消酒枳棋子乾葛花更能解酒毒亦不可少紫蘇梗蘇葉陳皮之類以順氣食積痰嗽者每食後即嗽其痰稠黏覺有甜意胸膈不寬者是也宜以枳實萊蔔子神麯麥芽山查之類以消食陳皮木香砂仁之類以順氣半夏南星之類以消痰石膏黃連之類以降火加生薑竹茹為引乾咳嗽者平素陰血不足虛火有餘喉中常庠庠即頻嗽有聲無痰者是也宜以麥冬知母川貝母元參阿膠之類為主治以黃柏茯苓花紛山梔甘草之類加燈心竹茹服之甚效又有嗽而兩脅痛有名曰肝咳有嗽而腰輕痛者名曰腎咳有嗽而中脘作疼者名曰脾咳有嗽而鼻流清涕者名曰肺咳有嗽而口苦舌乾者名曰心咳又有嗽而遺溺者氣虛也嗽而五心煩熱者血虛也果二細審而後發藥施治諒無不效矣又肯堂云諸嗽皆宜桔梗乃肺經本藥不可不用亦不可多用以其為舟楫之劑上而不下不用不能引諸藥至肺部多用則又承載諸藥而不能行更能作飽故不宜多用若治喉痛與元參甘草同用若開鬱與香附枳殼川芎蒼朮川貝母同用若作吐藥只與甘草等分為一大劑服之自捲痰而出矣汪藥洲先生云王氏謂諸嗽皆宜桔梗此語不能無弊驟咳者用之或宜若久咳者肺氣無有不虛方將斂之補之不暇尚可用桔梗升提辛散而犯虛虛之戒乎吾見久咳者服之而余破者有矣咳血者服之而血益甚者有矣虛喘者服之而氣暴脫者有矣何也凡上逆者法宜降之也即喉痛亦須降痰降火仲景師雖主以甘桔湯今法之只可作佐使必君以芩連類之苦降元參風化硝類之鹽降然後升提之品無礙也先生此論自注於王氏醫鏡中者因録存之以俟同人參考藥洲先生品高雅文章醫學並見重於同道好勉人為善著有武帝覺世真經詩行世字嗚岐又號鳳山吾邑汪益齊太史嗚謙之四弟也世居羊城附寄馮蕙庭君調養牌胃諭余脾胃素弱語云無脾胃弱老翁余竊慮焉因常留意調養迄今年及六旬飲食雖不加而精神無或減且微恙亦少見者知未始非調養力也凡人欲調養脾胃必先察夫脾胃性情明夫脾胃體用而後調養有方書云胃陽弱而百病生脾陰足而萬邪熄似治胃專究夫陽理脾專究夫陰不知脾體陰而用陽胃體陽而用陰此太陰濕土得陽則運陽明陽土得陰自安前賢所為特申明其用也夫脾能升而後能運陽氣餒則無以升腎能降而後能和陰液虧則無以降達其性情明其體用於以知納食主乎胃時知飢而少納脾陽不傷故知飢冒陰有傷故少納宜調養胃陰當用麥冬天冬沙參玉竹山藥扁豆糯米南棗叉斛甘草等以養之知運化主乎脾時能食而小運胃陰不病故能食脾陽有病故少連宜溫通脾陽當用人參內術茯苓陳皮益智仁炒粳米炒蓮葉等以醒之虛且寒再加乾薑附子肉桂以溫之此固無病培養善法亦病後調治善法也脾胃為後天養生者宜愛惜更常戒生冷物難化物以保護之延年之方莫善於此矣慎之勉之醫略所用方開列於後以便查閲分量炮製加減服法以及治證未盡載明欲知其詳當於名醫方論等書參考之黃芩湯黃芩白芍甘草大棗白虎湯石膏知母甘草粳米蔥鼓湯蔥白淡豆豉梔豆湯梔子淡豆豉葉案云梔豉湯能除陳腐濕熱穢濁鬱結非此不除六一散滑石六錢甘草一錢又名天水散加辰砂名益元散雄檳丸雄黃檳榔白礬等分研末搗飯為丸每服五分小兒減半飯遠服亦治胃痛因蟲者桂枝湯桂枝白芍甘草生薑大棗生脈散人參麥冬五味二陳湯茯苓半夏陳皮甘草豬苓湯豬苓茯苓澤瀉阿膠滑石四苓散豬苓茯苓澤瀉白朮五苓散即四苓加桂左金丸黃連薑汁炒六兩吳萸鹽水泡一兩滋腎丸黃柏一兩知母一兩肉桂一錢又名通關丸五淋湯山梔當歸白芍赤茯苓甘草梢二妙丸黃柏八兩蒼朮切片黑芝蕨打破拌勻飯上蒸三五次去芝麻焙乾三兩虎潛丸熟地當歸牛膝龜版虎脛骨黃柏知母瑣陽白巧陳皮羯羊肉清燥湯黃耆人參當歸生地麥冬蒼朮白朮黃柏黃連茯苓豬苓澤瀉陳皮柴胡升麻神麯五味甘草何人飲首烏人參當歸陳皮煨薑固元湯人參黃者當歸白芍炙草加煨薑棗四物湯地黃當歸白芍川芎歸脾湯黃耆人參白朮當歸龍眼肉棗仁茯神遠志木香炙草高鼓峰去本香加白芍錢半甚好然噓血歸脾全在木香受燥者當用咳加麥冬五味郁加川貝脾虛發熱加梔子丹皮四神丸補骨脂四兩酒炒肉豆蔻麵煨去油吳茱萸泡去黑水五味炒三味各二兩用紅棗五兩生薑五兩同煮去薑將棗去皮核搗爛為丸如桐子大每日五更服三錢臨臥服二錢米湯下再加入參白朮附子罌粟殼為丸更效理中湯人參白朮乾薑炙草丸方同六味湯地黃萸肉山藥茯苓丹皮澤瀉又名六味地黃丸丸方同八味湯即六味加附子肉桂又名附桂八味亦名腎氣丸左歸飲即六味加杞子炙草去丹皮澤瀉復脈湯人參阿膠地黃麥冬麻仁桂枝炙草大棗生薑又名炙甘草湯八珍湯即四君子四物湯合用啓膈湯沙參川貝丹參鬱金石菖蒲茯苓砂仁殼乾荷蒂杵頭粳布包煎太極丸黃柏二兩六錢知母一兩四錢補骨脂二兩八錢胡桃肉一兩二錢砂仁五錢蜜小丸空心鹽湯送下三十五丸整頓敗毒散人參羌活獨活柴朋前胡川芎枳殼桔梗茯苓甘草即人參敗毒散芍藥湯白芍黃芩黃連大黃歸尾檳榔木香肉桂炙草香連丸黃連二十兩吳萸十兩水拌同炒去吳萸加木香四兩八錢不見火共研末酷糊丸此為治痢總方惟在表忌用者邪猶未入里也久痢勿用者恐重傷其生氣也訶子散粟殼訶子乾薑陳皮為末空心服黃土湯生地阿膠黃芩白朮附子炮甘草各一錢五分灶心黃土四錢或黃土易赤石脂附易炮薑熱加生柏葉赤小豆散赤小豆浸出芽曬乾一兩當歸四錢研末粥水送下三錢旋覆花湯旋覆花青蔥管新絳緯茵陳蒿湯茵陳梔子大黃金鈴子散金鈴子即川楝子元胡索小半夏湯半夏生薑大牛夏湯牛夏人參白蜜吳茱更湯人參生薑大棗小柴胡湯柴胡黃芩半夏人參甘草薑棗麥門冬湯麥冬人參半夏甘草粳米大棗四君子湯人參白朮茯苓甘草六君子湯即四君子湯加半夏陳皮大補陰丸黃柏知母熟地龜版豬脊髓小承氣湯大黃四錢厚朴二錢枳實錢半此主蕩實故君大黃厚朴三物湯厚朴四錢大黃二錢枳實錢半此主散滿故君厚朴厚朴七物湯即厚朴三物加桂枝甘草生薑大棗調胃承氣湯大黃芒硝炙草大黃附子湯大黃附子細辛生脈四君湯即生脈散四君子湯合用生脈六味湯即生脈散六味地黃湯合用磁石六味丸即大味地黃湯加磁石知柏八味丸即六味地黃湯加知母黃柏湯方同當歸補血湯當歸三錢炙黃者一兩或加附子二三錢更神效當歸羊肉湯當歸生薑羊肉香砂六君湯即六君子湯加香附砂仁補中益氟湯炙耆二錢人參白朮當歸各一錢陳皮炙草各五分升麻柴胡各三分加煨薑大棗煎人參固本丸人參天冬麥冬生地熟地人參養營湯人參白朮茯苓甘草陳皮黃耆當歸白芍熟地五味子遠子肉桂煨薑大棗真人養臟湯人參白朮當歸白芍肉桂粟殼訶子肉豆蔻木香炙草一方無當歸附子理中湯即理中湯加附子附子粳米湯附子粳米半夏炙草大棗清暑益氣湯人參黃者白朮蒼朮當歸陳皮菁皮神麯麥冬五味炙草黃柏澤瀉升麻葛根生薑大棗霍香散霍香蒼朮半夏茯苓陳皮厚朴霍香正氣散霍香蘇葉白芷陳皮厚朴白朮夏曲茯苓腹皮桔梗甘草加薑棗四物香霍飲香薷厚朴扁豆黃連忌熱服三物香薷飲即四物香薷去黃連凡香薷熱服必瀉十物香薷飲即三物香薷加黃耆人參白朮茯苓陳皮甘草本瓜五物香薷獨加苓草茵陳四逆湯茵陳附子乾薑炙草四逆湯無茵陳桂枝白虎湯即白虎湯加桂枝人參白虎湯即白虎湯加人參暑熱傷津再加麥冬鮮嫩竹葉最佳清心涼膈散連翹黃芩梔子薄荷桔梗甘草鮮嫩大竹葉剪碎煎去桔梗加大黃芒硝薄荷生蜜名涼膈散括蔞薤白半夏湯瓜蔞皮仁各三錢製半夏二錢干薤白三錢生者倍用白酒三杯同煎

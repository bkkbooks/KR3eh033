body:
  text: 評琴書屋醫略卷二消渴症消有三消之分飲水多而小便少為上消食谷多而大便堅為中消飲一溲一小便如膏為了消上中二消屬熱下消屬寒前賢治法上消用人參白虎湯中消用調胃承氣湯下消用腎氣丸其實皆津液乾枯病故趙養葵先生謂凡大渴大燥無分上中下用大型六味地黃湯加肉桂五味名加減八味丸連劑頻進飲渴自止白虎承氣皆非所宜此趙論雖變古人成法其中實有妙義蓋人之濯溉一身全賴兩腎中水火少火能生氣則真水自升而渴自止加肉桂正所以溫動少火前賢治下消用腎氣丸者即此意燃臨症總貴因脈變通上消較多先擬清燥法大麥冬五錢連心大天冬二錢白粳米四錢大生地五錢雪梨乾八錢烏梅肉四分加生蜜沖服渴仍照方頻進蜜不拘多少與烏梅酸甜合病者口味為妙酸甘蓋取其化陰服三四劑仍渴倘脈洪大而數喜冷飲者加石膏知母仍渴再加黃連甘草脈沉弱而遲喜熱飲者擬方不合宜遵養葵法或腎氣丸中消用調胃承氣湯合四物湯或去芎硝君以石膏下消宜腎氣丸若骨瘦腿疼宜知柏八味加杜仲人參天冬五味嘔吐霍亂嘔吐見下腹痛症與此不同切勿混治嘔吐一症屬足陽明胃經有寒有熱有虛患此最宜明辨其因寒而嘔吐者脈必遲唇舌白惡飲因熱而嘔吐者脈必數唇頰赤口燥渴因虛而嘔吐者脈必虛唇白麵黃倦怠嗜臥果能因脈辨症施治必效茲擬症近於熱者立一安胃降逆輕劑以便因症加減金叉斛五錢先煎製半夏一錢半細甘草三分緒雲苓三錢化橘紅四分鮮竹前三錢加生薑一錢同煎或去甘草甘能守中壅氣發嘔因石解苦故少佐耳如確審得脈數熱盛加石膏粳米或麥冬鮮蘆根經驗方石膏粳米麥冬蘆根煎代茶止熱嘔頗佳方內生薑橘紅或減少或不月若脈遲有寒者去石斛竹茹加砂仁或蔻仁或獨加方內生薑用三四錢或五六錢寒重者加至兩零必效若脈虛屬中氣虛者去石斛竹茹加白朮人參大棗虛而兼寒者再加附子乾薑至若嘔吐而寒熱往來者少陽症也宜另用小柴胡湯主治附論噎隔反胃嘔吐症中更有病名噎隔病名反胃者其人於飲食之際氣忽阻塞曰噎心下隔拒或食到膈間不得下故古人亦有名之為膈者曰隔古人謂津液乾枯為噎隔病源忌投溫補可知誤用參者術以培補之愈增其隔誤用薑桂附以溫暖之益速其亡選藥必須用清潤之品以急救陽明胃陰為主高鼓峰謂治膈一陽明盡之如牛乳人乳沙參天冬麥冬地黃蘆根茅根韭汁陳酒最為要藥選方常遵楊乘六用左歸飲去茯芩加當歸生地主治然吾嘗用大半夏湯合麥門冬湯給之亦間有獲效者倘刺痛大便乾結大陽無血一當遵鼓峰法熟地五錢當歸白芍桃仁麻仁各三錢以潤之如其人形體尚壯加大黃二二錢以助血藥更妙或用酒大黃桃仁婦尾煉蜜為小丸茅根濃廁湯送下以緩下之大陽潤利胃口自開然此症年五十下或可治五十上難醫初病或易治久病難醫若飲食方下咽即上逆或剌痛啓膈飲之重用沙參以開肺氣之郁又不可不講究也若朝食而暮乃吐暮食而朝乃吐其大便甚利或溏者與膈症分別處驗大便為最要此中下二焦火衰反胃症也王太僕云食不得入是有火也食入反出是無火也宜吳茱萸湯附子理中湯或六君子湯加薑附治之高鼓峰亦主王太僕之論用八味丸主治然余治內人患此用大小半夏湯吳茱莫湯三方合用而痊除噎隔症外凡治嘔吐藥中磨沉香汁三四分其效倍速疸症即發黃症遍身面目溺皆黃原有五疸之分黃疸谷疸酒疸女勞疸黃汗陰陽虛實之別而究濕熱無蒸為患者居多治法必從氣分宣通乃效茲擬滲濕清熱佐以宣通氣分方法此症渴難治不渴易治苓皮五錢滑石三錢黃芩一錢北杏一錢茵陳三錢梔子一錢半蔻仁四分加淡豆豉三錢同煎一或重用鮮田基黃白草煎湯去渣將湯代水煎藥熟盛借用梔芩濕盛加蒼朮周身盡痛濕阻氣機也宜倍用蔻仁以開肺氣肺主一身之氣化故也炒銀花澤蘭葉霍香葉梗豬苓澤瀉木通萆薢海金沙腹皮皆芳香逐穢滲淡除濕之品可因症參人加減但所因不一治法頗多即女勞瘀血難療自有方書可考沈金鱉尊生引述頗詳可參考且分別黃腫與黃疸證治亦佳似不煩多贅然竊念陽黃陰黃清溫各別每見誤治者難免傷人是不得不明辨夫陽主明故黃如橘子色治胃脈或數或緩必有力即宜用上擬方並參以所列加減各法治之陰主晦故黃如曛黃色治脾脈必沉弱且身冷羅謙甫先生以茵陳四逆湯主之高鼓峰用四苓散加炮薑茵陳治之重者加附子又有脾液外越而發黃者脈弱體倦無神但面身黃目溺不黃貧而勞苦者多勞則傷脾脾虛不能收攝真氣故也宜香砂六君子湯加減治之附案二酒肉速綿之會適暑濕交蒸之時稍不謹慎最易犯此濕熱疸症擬七味遵服數劑便可全愈余當醫故交謝司馬侄年少患此初起即進原方二劑病已減半間數日再進二劑漸愈惟目尚黃只多飲烏龍茶此芬芳香能闢暑濕穢濁之氣與薄味調養而痊此症忌酒肉厚味葉案治疽症有云不宜下恐犯太陰變脹不知亦問其症之宜與不宜耳琴師左君逢源患此痙三月餘服藥罔效延余治自述每三四日始一更衣今已五日矣能食脈有力余用茵陳蒿湯加芒硝治之方用大黃三錢菌陳四錢梔子芒硝各二錢煎好衝入酒二杯服服後大瀉明日硝減半服再瀉病稍退隔四日仍苦便難前方去硝加桃仁三錢服二貼仍瀉二次繼以薄味調養而收全功頭痛頭為諸陽之會與厥陰肝脈會於巔故頭痛一症半由厥陰風火挾諸經火上擾所致茲即是議訂一方其風寒虛三者亦非盡無然六淫五賊之分氣血虛實之別前人成法自有可稽即沈芊緣尊生一書引述頗詳可因其援引而博考之至若偏正頭風當遵葉天士先生育陰和亢陽柔潤熄內風一法參入商治北杏三錢連翹二錢蔓荊子一錢鉤藤五錢白菊一錢半鮮蓮葉四錢用邊切碎煎熱盛加羚羊苦丁茶各三錢煎兼感受暑氣加六一散三錢引知確非由外感無發熱惡寒鼻塞聲重脈浮等去北杏運翹荊子轉用生地熟地天冬麥冬玉竹胡麻阿膠龜版鱉甲等選擇三五味配入本方治之此養肝體佐以清肝用法陰虛火浮最宜即偏正頭風亦可治葉案所謂育陰和亢陽柔潤熄內風者此也此等症或全用靜藥羚羊鉤藤菊花或亦不用或少佐之附論偏正頭風偏頭風多屬少陽以少陽行身之側故也誤投柴胡多致損目以升散少陽耗竭肝陰故也朱丹溪以左屬風屬火主血虛右屬痰屬熱主氣虛遵之亦有效有不效其初起者不論左右用鮮紅根地膽草頭五錢如無以白茅根代之富歸羚羊二味先煎木賊天麻荊子菊花各一錢川芎白芷各四分黑豆百粒煎服多效另有一種正頭風數日一發或數月一發此乃風毒客於髓海服藥難達病所故年深難愈宜用菊花陳茶蒸濃汁仰臥冷注鼻中或用生萊蔔汁或甜瓜蒂五分皂角二分細辛一分真麝香二釐蜜小丸綿裹塞鼻中涕濕則易之得嚏或出濁涕竅通而痛自解風毒傍於腦海之旁亦令偏頭痛倘用育陰和陽柔潤熄風法不效上從鼻治三法皆可選用左痛從左治右痛從右治亦有主左痛治右右痛治左者當並試之又或用肉桂一分人言一釐麝香二釐辛夷細辛各五釐胡椒十粒為末棗肉為丸加豌豆大一粒放膏藥中心貼準太陽穴一日常見效因風寒而起者更妙如壯年火盛者愈後服黃芩大黃瀉火則目自愈腹痛中臍及臍上下痛同考臍上屬太陰脾臍中屬少陰腎臍下屬厥陰肝當分別治之凡一切痛症虛者喜按得食則止脈無力實者拒按得食愈痛脈有力霍香梗三錢草決明四錢生白芍二錢川棟子一錢半大蕎麥三錢細甘草七分舊青皮八分醋炒加橘柚葉二錢鮮取剪碎同煎臍上痛加木香五六分炒穀芽三四錢中臍痛加吳萸五六分炒山甲一二片皆去霍梗青皮臍下痛加海嫖蛸四錢茵根一錢或再加制香附二錢炒山查核三錢去霍決蕎芍草五味倘按之冷仍須加吳萸或肉桂若女子患此則當時杞子蒺藜靈脂不可少下附奇經心痛案可參又腹痛恆有因飲食不慎而致者如肉食傷宜山查蓬朮阿魏食飯傷宜神麯麥牙食麵傷宜萊蔔子生冷傷宜草果蒼朮厚朴宿食傷宜枳實黃連蓬朮檳榔因其所傷之物而以主治之藥為君助以余藥兼以化氣痛自愈矣然而腹痛之因更有不止此者腹滿痛而大便閉為實有厚朴三物厚朴七物與大黃附子湯法腹滿痛而下利為虛有理中湯法雷嗚切痛而嘔吐為寒氣有附子粳米湯法慎疾者宜小心察之附案香邑黃閣鄉麥榭基每日交西必腹痛臟腑十二時流注説以西屬腎經將交戌痛乃漸止病年餘無有能愈之者一醫會作熱積治用朴枳連柏漸增腸嗚寒氣更或時吐時瀉又更一醫治以自制小丸此後則諸恙倍增腸嗚雖遠坐亦聞腹痛每至於悶死必西刻將盡始漸醒而痛緩日日如是無有間者危急之際邀余診脈無神結見兩關在尺擬附子粳米湯加味治之熟附子三錢炒粳米制半夏各四錢麗參木瓜炙草南棗肉各一錢是晚痛雖止而腸尚嗚亦將父戌而其嗚乃息翌日診原方加土炒白朮五錢棗肉改用三錢木瓜改用一錢半是晚諸恙俱安隔年餘適到黃閣復邀診據述今年上半載無恙後半載每月復發一二次因痛不比去年之甚故加味復方僅服半劑而自能漸安余仍用附子粳米湯合理中湯加味為小丸令其常服以防後患防黨參白朮各四兩附子當歸各一兩麗參半夏乾薑木瓜甘草各五錢用大棗糯米煎稠粥為小丸每服三錢早用淡鹽湯送後聞連服五料乃收全功附論霍亂症霍亂腹痛一症又當用霍香散等法治之王肯堂云霍亂不吐瀉或腹脹如鼓不得用別藥惟益元散可服炮湯冷定時時呷之或連末服下此藥能降邪氣消食墜痰和胃調中但聞腹中有響聲即是好消息不下則吐不吐則下乃霍亂中妙藥也大忌薑湯米湯烏梅梅醬余遵是法遇霍亂症或未吐瀉或已吐瀉用霍香葉建神麯大葉茶各三錢皆能和中澤瀉本通各一錢皆能降濁柴胡薑活各七八分皆能升清煎湯沖益元散三四錢俟將冷服之倘腹仍痛仍依法進有濕必須加蒼朮或佐以霍香散法無不獲效又古人調凡暴病母論其脈但從其症此誠確論霍亂症與一切痛疲急症脈多伏者斯言不可不記又謂凡病來迅速者俱屬肝經主病五行中最迅速者莫若風火肝為風火之臟故也此雖不僅為腹痛而言然肝主筋亦主痛則痛症亦不得謂無關於肝也霍亂症本迅速而起故亦須少加柴胡以蔬肝或佐青皮以伐肝附論疝氣症腹痛亦有因疝氣連及臍下厥陰肝中臍少陰腎臍上太陰脾及兩脅少陽膽而痛者宜遵丹溪議專治厥陰肝主筋主痛故也疝雖有七寒疝筋疝水疝氣疝血疝狐疝㿗疝治法總以辛香流氣蔬泄厥陰為主金鈴子散左金丸五苓散三方當合用而加減治之凡暴疝多寒久疝多熱如寒則重用吳萸桂枝或再加小茴肉桂熱則重用黃連川棟或再加黃柏木通其南木香青木香即兜鈴根橘核鮮橘葉鮮黃皮枝鮮田基黃皆辛香流氣宜絡舒肝之品合參入為佐使沙參一兩同豬小肚煎羹治疝會效沙參清肺能令肺金清肅之氣下行肺與膀胱通氣化故也三層茴香丸用沙參即此意倘欲再佐宜活絡血之法兼欲引藥力直走至陰之域則桃仁歸鬚山甲韭白雄鼠矢在所必用至若老弱久疝幸丸下墜又當溫散奇經升舉奇陽經云任脈為病男子內結七疝女子帶下瘕聚固本補虛又為最要當歸羊肉湯滋腎丸虎潛丸皆治木法也其小茴炒當歸小茴拌水炒當歸能通肝臟脈張之陽氣兔絲子關沙苑杞子鹿茸鹿角霜桂枝尖白蒺藜皆可因症商用心痛心痛者非心痛也真心痛不治乃心胞絡興胃脘痛耳訂方遵苦辛降通一法通則不瘻矣當更參後列各見症辨其所因而加減治之丹參三錢川楝一錢半麥冬二錢連心打破硃砂拌勻香附一錢延胡一錢半烏藥一錢佛手二錢加春砂仁三粒連殼打破同煎或磨檀香汁些少衝服或加百合同煎百合烏藥名百合湯川楝子延胡名金鈴子散丹參砂仁檀香名丹參飲三方皆治心痛凡心痛症用豬心一個煎湯去豬心將湯代水煎藥更效久痛者方中必須加當歸桃仁以活絡血若得食則痛緩此由於積勞而營血虛歸桃外再加柏仁胡麻圓肉原方減去川楝延胡烏藥春砂倘心痛切背此胸痹症宜括蔞薤白半夏湯又痛因痰痛而惡悶嘔出痰飲即寬者為痰加半夏貝母瓜蔞仁去丹參麥冬香附因食滯覺飽時暖氣直至飢而後緩者為食滯加草果枳實檳榔或麥芽神麯去丹參延胡烏藥因寒痛時飲熱湯熱酒而痛緩者為寒加乾薑良薑去麥冬丹參因郁痛應背心者為郁見症似胸痹宜燥宜潤當辨加川貝母川芎去烏藥砂仁因蟲心頭急痛唇白毛堅日吐黃水者為蟲加雷丸君肉烏梅黃連去丹參麥冬烏藥延胡砂仁感用檳雄丸治之因瘀血心頭結痛氣逆上衝唧唧有聲者為血加蘇木三稜蓬朮或加桃仁紅花降香去麥冬砂仁烏藥又有心痛頻發痛極悶死必吐涎水而後醒者乃寒痰積於心脾用炒梔子一兩煎加竹瀝薑汁各一杯沖服有卒然大痛無聲手足冰冷且氣冷麵青咬牙噤齒此乃真心痛因寒邪直犯君火僅對時即斃如用豬心湯煎麻黃官桂附子乾薑急服或有得生者此法出黃肯堂醫鏡謂此乃祕要妙法附案奇經心痛順邑馬荔隱方伯第五妾據荔隱述每戌亥必腹痛戌亥為至陰之時肝腎為至陰之臟奇經八脈皆發源於肝腎故也其痛始臍下漸繞臍上及兩脅以至於心天曉則安然無恙平日慣以八珍湯獲小效而自能漸安今陸醫與之診謂脈近有力當清其源然後永無再發轉用苦寒劑痛益增明日再診謂倍有力論脈當清前劑輕小藥力不到耳古人謂通則不痛至若寒者溫之使通虛者補之使通醫似不曉且每三兩日始一更衣此治必合幽門氣鈍血燥醫似未明用大承氣湯加桃仁川楝子大劑進服大便瀉後日夜皆痛陰陽兩傷且頻嘔不食特延君愈之餘脈之曰症屬虛寒理宜溫補荔隱曰脈鼓指否余曰鼓指曰脈若是安能補余曰未進承氣前叢似有力未必鼓指曰誠如君言何也曰此真氣虛而邪氣實耳夫胃氣充足者其脈緩今苦寒攻伐胃氣愈傷是以鼓揭凡實熱脈重按仍有力今重按則軟目唇白而困倦無神豈有餘症耶少腹痛必心痛者經云陰維脈病苦心痛也奇經八脈皆發源於肝腎原當治下因苦寒更傷中州法不得不中下兼顧使急逐其寒邪而復其胃氣愚見擬用吳茱萸湯合附子粳米煬加滅先進方用野山麗參四錢吳萸附子各二錢炒粳米半夏生薑各三錢大棗二枚一服吐止痛減次日診仍用前方加於術三錢炙草一錢煎服三日診脈象和緩痛減八九轉用當歸小茴五分拌炒仍用同煎紫石英生研各五錢潞黨杞子各四錢鹽水炒破故子制香附制蘄艾葉各一錢服四貼後間或加天生術關沙苑同煎或加野山土術人參北鹿茸末各一錢另燉沖服調養將一月而痊半載後因房事痛復發且少腹脹左尺弦徑腎虛風動用轉方七味去潞黨石英故子加海螵蛸白蒺藜各四錢茵根一錢蠍尾梢一分二劑漸愈後仍用歸杞七味方與配入參茸野術砂仁熟地出入而調餐以收全功脅痛脅痛多屬少陽厥陰以兩脅屬少陽又肝脈絡布於脅筋也治主宣絡佐以平肝川棟子一錢半夏枯草三錢舊青皮一錢醋炒延胡索一錢半臺烏藥一錢粉丹皮一錢去心雙鉤藤四錢加鮮橘柚葉剪碎青蔥管寸斷各三錢凡久痛必入絡須加桃仁紅花以活絡血或參入旋覆花湯以降絡或佐入蘇子生薏米降香葉氏三味慣並用芥子以通絡王肯堂謂大忌陳皮生薑細辛服之即令肝脹以其能補肝故也用青皮宜醋炒酸能破結直入肝經故也痛甚者加醋半酒杯沖藥服凡痛亦當知在氣在血見症各有不同痛而不臌按之愈痛痛無時止瘀血作痛也痛而且臌得噯即緩痛有止時怒氣作痛也怒氣作痛加酷炒柴胡佐青皮以伐其肝少加木香佐烏藥以開其氣紅花當歸又或酌用以利其血也或去鉤藤延胡瘀血作痛加桃仁歸尾紅花去鉤藤烏藥青皮姑草或少佐醋炒柴胡川芎或加蘇木山查蓬朮等若痛甚加大黃下之此氣與血見症所由分亦氣與血用藥所宜辨也若微痛著於一處此為痰痛上擬方藥不合用必君以芥子佐以竹瀝薑汁治之其絲瓜絡白蒺蒺浙貝膽星蔞皮青皮黃連等亦臺佐使腰痛腰者腎之俯在內為少陰腎在外為太陽膀胱故腰痛必從二經主治一表一里治法攸分須明夫邪自外來而痛者屬膀胱虛由內生而痛者屬腎宜填宜補而溫宜通法原不一余嘗擬補腎一方相傳而服者多效先録存之愚見再參末分治金狗脊四錢去毛兔絲子三錢破故子五分鹽水拌炒關沙苑四錢牛膝肉二錢酒炒厚黃柏五分鹽水拌炒生杜仲三錢或用豬腰一對煎湯代水煎藥熱黃柏倍故子寒故子倍黃柏或二三倍痛已除再加入熟地杞子胡桃或鹿茸鹿角霜多服數貼方免復患凡腰痛脈沈而細者當治少陰時痛時止腎精虧也即用上擬補腎方主治時痛時熱腎水虧也宜另用知柏八味湯治之若脈浮而緊者當治太陽背肉刺痛風容於腎臉穴也麻黃細辛獨預防風生地當歸白芍以蔬其風鬱痛畏冷寒客於氣海腧也麻黃附子細辛當歸炙草以驅其寒痛重難移濕著於藏精所也麻黃蒼朮白尤當蹄杜仲牛膝茯苓薏米炙草以逐其濕腳氣痛此名壅疾謂濕氣壅塞經絡致痛也忌用補劑若專事溫補必成廢疾有寒濕風濕濕熱之分宜細按後列脈症加減擬方治之當時三錢舊木瓜二錢酒炒細木通一錢半薑活一錢半生薏米五錢紫蘇一錢半防風一錢半加生赤小豆皮五錢同煎臨夜發熱而痛脈濡而數者為濕熱加黃柏麥冬同煎晝夜憎寒作痛脈濡而遲者為寒濕加蒼朮乾薑附子防已加皮去木通蘇梗其腫痛走注無常或踝或膝或脛脈濡浮兼數者為風濕加生地牛膝去木瓜薏米蘇梗不效再加入芒硝大黃同煎若嗜酒而伏酒濕毒者辨脈輿症或兼寒兼熱康風遵上三法選藥施給重加枳棋子乾葛花以解酒毒或用巴戟五錢糯米拌水炒乾去米大黃一兩炒同為末蜜丸名巴黃丸溫水送下五七十丸仍須戒酒凡腳痛山甲地能可加作引若走動而痛上臂手須加云仙另有乾腳氣痛不腫而踡縮枯細當潤血清燥宜玉竹生地麥冬天冬胡麻石斛牛膝歸鬚鱉甲阿膠等又有陰虛腳痛足跟焮腫而紅當補賢養營宜龜版生地熟地當歸大冬杞子杜仲玉竹巴戟黃柏知母牛膝等二症與腳氣濕症大相反彼此誤治必增劇附論痿躄症腳氣痛外又有所謂痿躄者方書謂痿症無痛不知兼濕重者則筋緩而痿軟兼熱多者則筋急而作痛余見痿症慣有兼痛者醫用祛風藥丹溪謂斷不可作風治滲濕藥作風濕腳氣痛治無不增劇是以特附此症於腳氣痛條中汪石山治一人痿兼痛者用人參二錢黃耆一錢半白朮茯苓生地麥冬各一錢當歸八分黃柏知母各七分連服數貼而痿痛愈夫痿有脈痿筋痿肉痿骨痿之殊原不止痿於足更有頭痿手痿腰痿一身俱痿而經謂諸痿生於肺熱肺主一身氣化肺燥熱則血液涸而不能營養筋骨故痿又謂治痿獨取陽明陽明主潤筋束以利機關虛則宗筋弛叢手足痿而不能用叢諸痿商治概可悟矣若痿躄在下則肝腎病多肝主筋肝血傷血不營筋則四肢不用而筋骨拘攣腎藏精精血相生虛則不能灌溉諸末而營養筋骨而肺胃亦宜兼顧大補陰丸滋腎丸虎潛丸二妙丸若肺燥蒼朮可勿用人參固本丸皆堪選用其玉竹巴戟杞子杜仲等可參入五方加減治之三指禪注經驗方地黃四兩黃柏知母各一兩肉桂一錢煉蜜為丸方書有謂血虛四物湯二妙丸臺用氣虛四君子湯二妙丸合用加龜版虎骨當歸地黃可知二妙丸亦治痿症要藥若痿症見於上則肺熱居多東垣清燥湯在所必用刨即冬沙參粳米每日煎粥飲似極平淡究屬神奇也此法治消渴亦佳耳痛耳鳴耳聾同辨證治腎關竊聲心亦寄竅於耳膽脈絡附於耳老弱與久病皆屬體虛失聰聾鳴而不痛治在肝腎少年或暴病總屬邪干閉竅痛鳴聾皆有治在膽經即本是議酌方先擬清少陽絡法羚羊角三錢先煎連翹殼二錢粉丹皮一錢苦丁茶一錢半牛蒡子一錢半香白芷二分加鮮蓮梗三錢寸斷鮮蓮葉邊三錢剪碎為引氣閉則耳鳴耳聾簿荷梗夏枯草蔓荊子鉤藤菊花馬勃木通皆通竅之品可參入加減火鬱則耳痛菊葉桑葉銀花梔子亦可任加然原方已屬統治至若肝腎虛而為聾為鳴者宜用磁石六味丸加龜版五味遠志菖蒲主治人參當歸杞子鬼絲沙苑杭菊亦可因症選用牙痛上齒脈絡屬足陽明胃下齒脈絡屬手陽明大腸有風痛熱痛蟲痛寒痛痰毒痛瘀血痛之分備載本門可考惟風熱痛為尤多因訂一清絡熱方法金銀花三錢雙鉤藤四錢粉丹皮一錢絲瓜絡三錢連翹殼二錢生甘草八分加生柏葉三錢引上齒痛或加石膏知母下齒痛或加生地秦艽風痛加荊芥防風水虧火亢加生地天冬麥冬元參去絲瓜絡連翹鉤藤食飯後倍痛胃火旺也知母大便結者加生地七人錢風化硝二三錢亦去絲瓜三味
